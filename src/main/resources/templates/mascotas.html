<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Módulo de Mascotas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #eef2f7;
    font-family: Arial, sans-serif;
}

.contenedor {
    margin-top: 30px;
}

.card {
    border: none;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,.08);
}

.titulo {
    font-weight: bold;
    color: #0f172a;
}

.subtitulo {
    font-size: 14px;
    color: #6b7280;
}

.form-control {
    border-radius: 10px;
    height: 45px;
    background-color: #f8fafc;
    border: 1px solid #e2e8f0;
}

.table {
    margin-top: 20px;
    vertical-align: middle;
}

.table thead th {
    color: #6b7280;
    font-size: 13px;
    font-weight: bold;
    border-bottom: 1px solid #edf2f7;
    letter-spacing: 0.5px;
}

.table tbody tr:hover {
    background: #f8fafc;
}

/* Botones de acción estilizados */
.btn-action-edit {
    color: #2563eb;
    background-color: #eff6ff;
    border: none;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 500;
    text-decoration: none;
}
.btn-action-edit:hover { background-color: #dbeafe; }

.btn-action-delete {
    color: #dc2626;
    background-color: #fef2f2;
    border: none;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 500;
    text-decoration: none;
}
.btn-action-delete:hover { background-color: #fee2e2; }
</style>
</head>

<body>

<div class="container contenedor">
    <div class="card">
        
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h3 class="titulo">🐾 Módulo de Mascotas</h3>
                <p class="subtitulo">Listado de registros en el sistema</p>
            </div>
            <div>
                <a href="/vista/nueva-mascota" class="btn btn-primary px-4" style="border-radius: 10px; background-color: #2563eb;">
                    + Nueva Mascota
                </a>
            </div>
        </div>

        <form th:action="@{/vista/mascotas}" method="get">
            <input type="text" name="buscar" th:value="${param.buscar}" class="form-control mt-3" placeholder="🔍 Buscar...">
        </form>

        <table class="table table-hover">
            <thead>
                <tr>
                    <th>CÓDIGO</th>
                    <th>NOMBRE</th>
                    <th>RAZA</th>
                    <th>EDAD</th>
                    <th>SEXO</th>
                    <th class="text-center">ACCIONES</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${listaMascotas}">
                    <td th:text="'M-00' + ${m.idMascota}"></td>
                    <td th:text="${m.nombre}" style="font-weight: 500; color: #1e293b;"></td>
                    <td th:text="${m.raza}"></td>
                    <td th:text="${m.edad} + ' años'"></td>
                    <td th:text="${m.sexo}"></td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{/vista/editar-mascota/{id}(id=${m.idMascota})}" class="btn-action-edit">
                                Editar
                            </a>
                            <a th:href="@{/vista/eliminar-mascota/{id}(id=${m.idMascota})}" class="btn-action-delete"
                               onclick="return confirm('¿Está seguro de eliminar esta mascota?')">
                                Eliminar
                            </a>
                        </div>
                    </td>
                </tr>
                
                <tr th:if="${#lists.isEmpty(listaMascotas)}">
                    <td colspan="6" class="text-center text-muted py-4">No se encontraron mascotas registradas.</td>
                </tr>
            </tbody>
        </table>
        
    </div>
</div>

</body>
</html>
