<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Huellitas - Iniciar Sesión</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

	body {
		min-height: 100vh;
		margin: 0;
		display: flex;
		align-items: center;
		justify-content: center;
		background: linear-gradient(135deg, #0a1e4d 0%, #2f5ce0 45%, #1a8f5e 100%);
		font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
	}

	.login-card {
		width: 100%;
		max-width: 460px;
		background-color: #fff;
		border-radius: 16px;
		overflow: hidden;
		box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
	}

	.login-header {
		background: linear-gradient(135deg, #14224d, #2952d6);
		padding: 2.25rem 2rem 1.75rem;
		text-align: center;
	}

	.login-icon {
		width: 64px;
		height: 64px;
		margin: 0 auto 1rem;
		border-radius: 50%;
		background-color: rgba(255, 255, 255, 0.15);
		display: flex;
		align-items: center;
		justify-content: center;
	}

	.login-icon i {
		font-size: 1.9rem;
		color: #fff;
	}

	.login-header h1 {
		color: #fff;
		font-size: 1.5rem;
		font-weight: 700;
		margin: 0 0 0.3rem;
	}

	.login-header p {
		color: #aebdf0;
		font-size: 0.88rem;
		margin: 0;
	}

	.login-body {
		padding: 2rem 2rem 1.75rem;
	}

	.login-body h2 {
		font-size: 1.15rem;
		font-weight: 700;
		color: #14224d;
		margin-bottom: 1.25rem;
	}

	.form-label {
		font-size: 0.85rem;
		font-weight: 500;
		color: #4a4f55;
	}

	.input-icon-group {
		position: relative;
	}

	.input-icon-group i.icono-input {
		position: absolute;
		left: 0.9rem;
		top: 50%;
		transform: translateY(-50%);
		color: #9aa1ab;
		font-size: 0.95rem;
	}

	.input-icon-group input {
		padding-left: 2.4rem;
		border-radius: 9px;
		border: 1px solid #e3e5e8;
		height: 46px;
	}

	.input-icon-group input:focus {
		border-color: #2952d6;
		box-shadow: 0 0 0 3px rgba(41, 82, 214, 0.12);
	}

	.toggle-password {
		position: absolute;
		right: 0.9rem;
		top: 50%;
		transform: translateY(-50%);
		color: #9aa1ab;
		cursor: pointer;
		background: none;
		border: none;
		font-size: 0.95rem;
	}

	.btn-ingresar {
		background: linear-gradient(135deg, #2952d6, #1a9d6f);
		border: none;
		color: #fff;
		font-weight: 600;
		height: 48px;
		border-radius: 9px;
		font-size: 0.95rem;
	}

	.btn-ingresar:hover {
		opacity: 0.92;
		color: #fff;
	}

	.divider-text {
		text-align: center;
		font-size: 0.78rem;
		color: #9aa1ab;
		margin: 1.5rem 0 0.85rem;
		border-top: 1px solid #eef0f2;
		padding-top: 1rem;
	}

	.credenciales-prueba {
		display: flex;
		gap: 0.6rem;
	}

	.credencial-chip {
		flex: 1;
		background-color: #f4f6f9;
		border-radius: 8px;
		padding: 0.5rem 0.4rem;
		text-align: center;
		cursor: pointer;
		border: 1px solid transparent;
		transition: border-color 0.15s ease;
	}

	.credencial-chip:hover {
		border-color: #2952d6;
	}

	.credencial-chip .usr {
		font-size: 0.8rem;
		font-weight: 600;
		color: #14224d;
		display: block;
	}

	.credencial-chip .pwd {
		font-size: 0.75rem;
		color: #9aa1ab;
		display: block;
	}

	.login-footer-note {
		text-align: center;
		color: #d6def5;
		font-size: 0.78rem;
		margin-top: 1.25rem;
	}

	#mensajeError {
		display: none;
	}

</style>
</head>
<body>

<div>

	<div class="login-card">

		<div class="login-header">
			<div class="login-icon">
				<i class="bi bi-suit-heart-fill"></i>
			</div>
			<h1>Huellitas</h1>
			<p>Sistema de Gestión Veterinaria</p>
		</div>

		<div class="login-body">

			<h2>Iniciar Sesión</h2>

			<div class="alert alert-danger py-2" id="mensajeError">
				Usuario o contraseña incorrectos.
			</div>

			<form id="formLogin">

				<div class="mb-3">
					<label class="form-label">Usuario</label>
					<div class="input-icon-group">
						<i class="bi bi-person icono-input"></i>
						<input type="text" id="usuario" class="form-control"
							placeholder="Ingrese su usuario" required>
					</div>
				</div>

				<div class="mb-4">
					<label class="form-label">Contraseña</label>
					<div class="input-icon-group">
						<i class="bi bi-lock icono-input"></i>
						<input type="password" id="password" class="form-control"
							placeholder="Ingrese su contraseña" required>
						<button type="button" class="toggle-password" id="togglePassword">
							<i class="bi bi-eye"></i>
						</button>
					</div>
				</div>

				<button type="submit" class="btn btn-ingresar w-100">
					Ingresar al Sistema
				</button>

			</form>

			<div class="divider-text">Credenciales de prueba:</div>

			<div class="credenciales-prueba">
				<div class="credencial-chip" data-usuario="admin" data-password="admin123">
					<span class="usr">admin</span>
					<span class="pwd">admin123</span>
				</div>
			</div>

		</div>

	</div>

	<div class="login-footer-note">
		© 2026 Huellitas · v1.0.0
	</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
	$(document).ready(function() {

		// Click en chip de credenciales: rellena el formulario
		$('.credencial-chip').on('click', function() {
			$('#usuario').val($(this).data('usuario'));
			$('#password').val($(this).data('password'));
		});

		// Mostrar/ocultar contraseña
		$('#togglePassword').on('click', function() {
			var campo = $('#password');
			var icono = $(this).find('i');
			if (campo.attr('type') === 'password') {
				campo.attr('type', 'text');
				icono.removeClass('bi-eye').addClass('bi-eye-slash');
			} else {
				campo.attr('type', 'password');
				icono.removeClass('bi-eye-slash').addClass('bi-eye');
			}
		});

		// Envío del formulario
		$('#formLogin').on('submit', function(e) {
			e.preventDefault();

			$('#mensajeError').hide();

			$.ajax({
				url: '/login',
				type: 'POST',
				data: {
					usuario: $('#usuario').val(),
					password: $('#password').val()
				},
				success: function() {
					// Redirige al listado de mascotas tras login exitoso
					window.location.href = '/vista/mascotas';
				},
				error: function() {
					$('#mensajeError').show();
				}
			});
		});

	});
</script>

</body>
</html>
