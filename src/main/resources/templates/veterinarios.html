<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Veterinarios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#eef2f7;
font-family:Arial,sans-serif;
}

.contenedor{
margin-top:30px;
}

.card{
border:none;
border-radius:20px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.titulo{
font-weight:bold;
color:#0f172a;
}

.btn.btn-primary{
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:10px;

    padding:6px 16px;
    font-size:14px;

    width:auto;
    height:38px;

    display:inline-flex;
    align-items:center;
    justify-content:center;
}
.form-control{
border-radius:10px;
height:45px;
}

.table{
margin-top:20px;
}

.table thead{
background:#ffffff;
}

.table thead th{
color:#6b7280;
font-size:14px;
}

.table tbody tr:hover{
background:#f5f5f5;
}

.btn-warning{
border-radius:8px;
}

.btn-danger{
border-radius:8px;
}

.especialidad{

padding:5px 10px;
border-radius:15px;
font-size:13px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container contenedor">

<div class="card p-4">

<div class="d-flex justify-content-between">

<div>
<h3 class="titulo">
Módulo de Veterinarios
</h3>

<p>
Listado de veterinarios registrados
</p>
</div>

<a href="/nuevo-veterinario"
class="btn btn-primary">

+ Nuevo Veterinario

</a>

</div>

<form action="/vista/veterinarios" method="get">

<input type="text"
name="buscar"
class="form-control mt-3 mb-3"
placeholder="Buscar...">

</form>

<table class="table table-hover">

<thead class="table-dark">

<tr>

	<th>ID</th>
	<th>Nombres</th>
	<th>Especialidad</th>
	<th>Correo</th>
	<th>Teléfono</th>
	<th>Estado</th>
	<th class="text-center">Acciones</th>
</tr>

</thead>

<tbody>

<tr th:each="v : ${listaVeterinarios}">

    <td th:text="${v.idVeterinario}"></td>

    <td th:text="${v.nombres}"></td>

    <td>
        <span class="especialidad"
        th:classappend="${v.especialidad=='Cirugía'} ? ' bg-danger' :
                        (${v.especialidad=='Dermatología'} ? ' bg-success' :
                        ' bg-info')"
        th:text="${v.especialidad}">
        </span>
    </td>

    <td th:text="${v.correo}"></td>

    <td th:text="${v.telefono}"></td>

    <td>
        <span class="badge bg-success"
        th:text="${v.estado}">
        </span>
    </td>

	<td class="text-center">

	<div class="d-flex justify-content-center gap-2">

		<a th:href="@{/editar-veterinario/{id}(id=${v.idVeterinario})}"
		class="btn btn-warning">

		Editar
		</a>

		<a th:href="@{/eliminar-veterinario/{id}(id=${v.idVeterinario})}"
		class="btn btn-danger"
		onclick="return confirm('¿Eliminar veterinario?')">

		Eliminar
		</a>

	</div>

	</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
