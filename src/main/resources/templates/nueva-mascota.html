<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registrar Nueva Mascota</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body {
    background: #eef2f7;
    font-family: Arial, sans-serif;
}

.vc-layout {
	display: flex;
}
.vc-content {
	flex: 1;
	min-width: 0;
}

.card {
    margin-top: 40px;
    padding: 30px;
    border: none;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,.08);
    background-color: #ffffff;
}

.titulo {
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 25px;
}

.form-control, .form-select {
    border-radius: 10px;
    height: 45px;
    background-color: #f8fafc;
    border: 1px solid #e2e8f0;
    color: #334155;
}

.form-control:focus, .form-select:focus {
    background-color: #ffffff;
    border-color: #cbd5e1;
    box-shadow: none;
}

label {
    font-weight: 500;
    color: #475569;
    font-size: 14px;
    margin-bottom: 6px;
}

.btn-custom-primary {
    background-color: #2563eb;
    border: none;
    border-radius: 10px;
    padding: 10px 25px;
    font-weight: 500;
}

.btn-custom-primary:hover {
    background-color: #1d4ed8;
}

.btn-custom-secondary {
    border-radius: 10px;
    padding: 10px 25px;
}

/* ===== SIDEBAR ===== */
.vc-sidebar {
	width: 260px;
	min-height: 100vh;
	background-color: #0f1f3d;
	color: #c7d0e0;
	display: flex;
	flex-direction: column;
	flex-shrink: 0;
}
.vc-sidebar a {
	text-decoration: none;
	color: inherit;
}
.vc-brand {
	display: flex;
	align-items: center;
	gap: 0.75rem;
	padding: 1.25rem 1.25rem 1.5rem;
}
.vc-brand-icon {
	width: 38px;
	height: 38px;
	border-radius: 9px;
	background: linear-gradient(135deg, #4f7cff, #2f5ce0);
	display: flex;
	align-items: center;
	justify-content: center;
	flex-shrink: 0;
}
.vc-brand-icon i {
	color: #fff;
	font-size: 1.05rem;
}
.vc-brand-text .vc-brand-title {
	font-weight: 700;
	font-size: 1rem;
	color: #fff;
	line-height: 1.2;
}
.vc-brand-text .vc-brand-subtitle {
	font-size: 0.72rem;
	color: #7da2ff;
}
.vc-nav {
	flex: 1;
	overflow-y: auto;
	padding: 0.25rem 0.75rem;
}
.vc-section {
	margin-bottom: 0.2rem;
}
.vc-section-toggle {
	display: flex;
	align-items: center;
	gap: 0.65rem;
	padding: 0.65rem 0.75rem;
	border-radius: 8px;
	font-weight: 600;
	font-size: 0.88rem;
	color: #e3e8f2;
	cursor: pointer;
	user-select: none;
}
.vc-section-toggle:hover {
	background-color: rgba(255,255,255,0.04);
}
.vc-section-toggle i.vc-icon-main {
	font-size: 1rem;
	width: 18px;
	text-align: center;
}
.vc-section-toggle .vc-chevron {
	margin-left: auto;
	font-size: 0.75rem;
	transition: transform 0.2s ease;
	color: #8b96ad;
}
.vc-section.open .vc-chevron {
	transform: rotate(180deg);
}
.vc-subnav {
	list-style: none;
	margin: 0;
	padding: 0.15rem 0 0.4rem 2.55rem;
	display: none;
}
.vc-section.open .vc-subnav {
	display: block;
}
.vc-subnav li {
	margin: 0.1rem 0;
}
.vc-subnav a {
	display: block;
	padding: 0.45rem 0.6rem;
	border-radius: 7px;
	font-size: 0.85rem;
	color: #9aa6bd;
	position: relative;
}
.vc-subnav a:hover {
	color: #fff;
	background-color: rgba(255,255,255,0.05);
}
.vc-subnav a.activo {
	color: #fff;
	font-weight: 600;
	background-color: #2952d6;
}
.vc-footer {
	display: flex;
	align-items: center;
	gap: 0.65rem;
	padding: 1rem 1.1rem;
	border-top: 1px solid rgba(255,255,255,0.07);
}
.vc-avatar {
	width: 34px;
	height: 34px;
	border-radius: 50%;
	background-color: #2952d6;
	display: flex;
	align-items: center;
	justify-content: center;
	flex-shrink: 0;
}
.vc-avatar i {
	color: #fff;
	font-size: 1rem;
}
.vc-footer-text {
	flex: 1;
	min-width: 0;
}
.vc-footer-name {
	font-size: 0.83rem;
	font-weight: 600;
	color: #fff;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}
.vc-footer-role {
	font-size: 0.74rem;
	color: #5d8aff;
}
.vc-footer-exit {
	color: #8b96ad;
	font-size: 1rem;
}
.vc-footer-exit:hover {
	color: #fff;
}
</style>
</head>

<body>

<div class="vc-layout">

	<!-- ===== SIDEBAR (incrustado directo, sin fragmento) ===== -->
	<nav class="vc-sidebar">

		<div class="vc-brand">
			<div class="vc-brand-icon">
				<i class="bi bi-suit-heart-fill"></i>
			</div>
			<div class="vc-brand-text">
				<div class="vc-brand-title">Huellitas</div>
				<div class="vc-brand-subtitle">Gestión Veterinaria</div>
			</div>
		</div>

		<div class="vc-nav">

			<div class="vc-section">
				<div class="vc-section-toggle">
					<i class="bi bi-people vc-icon-main"></i>
					<span>Propietarios</span>
					<i class="bi bi-chevron-down vc-chevron"></i>
				</div>
				<ul class="vc-subnav">
					<li><a href="/vista/propietarios">Listado de Propietarios</a></li>
				</ul>
			</div>

			<div class="vc-section">
				<div class="vc-section-toggle">
					<i class="bi bi-clipboard2-pulse vc-icon-main"></i>
					<span>Veterinarios</span>
					<i class="bi bi-chevron-down vc-chevron"></i>
				</div>
				<ul class="vc-subnav">
					<li><a href="/vista/veterinarios">Listado de Veterinarios</a></li>
				</ul>
			</div>

			<div class="vc-section">
				<div class="vc-section-toggle">
					<i class="bi bi-calendar2-week vc-icon-main"></i>
					<span>Citas Médicas</span>
					<i class="bi bi-chevron-down vc-chevron"></i>
				</div>
				<ul class="vc-subnav">
					<li><a href="/nueva-cita">Programar Cita</a></li>
					<li><a href="/vista/citas">Listado de Citas</a></li>
				</ul>
			</div>

			<div class="vc-section open">
				<div class="vc-section-toggle">
					<i class="bi bi-heart-pulse vc-icon-main"></i>
					<span>Mascotas</span>
					<i class="bi bi-chevron-down vc-chevron"></i>
				</div>
				<ul class="vc-subnav">
					<li><a href="/vista/nueva-mascota" class="activo">Registrar Mascota</a></li>
					<li><a href="/vista/mascotas">Listado de Mascotas</a></li>
				</ul>
			</div>

		</div>

		<div class="vc-footer">
			<div class="vc-avatar">
				<i class="bi bi-person-fill"></i>
			</div>
			<div class="vc-footer-text">
				<div class="vc-footer-name">Administrador General</div>
				<div class="vc-footer-role">Administrador</div>
			</div>
			<i class="bi bi-box-arrow-right vc-footer-exit"></i>
		</div>

	</nav>
	<!-- ===== FIN SIDEBAR ===== -->

	<div class="vc-content">

<div class="container" style="max-width: 800px;">
    <div class="card">
        
        <h3 class="titulo">🐾 Registrar Nueva Mascota</h3>

        <form th:action="@{/guardar-mascota}" method="post" th:object="${mascota}">

            <input type="hidden" th:field="*{idMascota}">

            <div class="row">
                
                <div class="col-md-6 mb-3">
                    <label>Código</label>
                    <input type="text" class="form-control text-muted" value="M-011" disabled>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Nombre *</label>
                    <input type="text" class="form-control" placeholder="Nombre de la mascota" th:field="*{nombre}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Especie *</label>
                    <select class="form-select" required>
                        <option value="Canino">Canino</option>
                        <option value="Felino">Felino</option>
                        <option value="Ave">Ave</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Raza *</label>
                    <input type="text" class="form-control" placeholder="Raza de la mascota" th:field="*{raza}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Edad</label>
                    <input type="text" class="form-control" placeholder="Ej: 2 años" th:field="*{edad}">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Sexo *</label>
                    <select class="form-select" th:field="*{sexo}" required>
                        <option value="Macho">Macho</option>
                        <option value="Hembra">Hembra</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Propietario</label>
                    <select class="form-select">
                        <option value="">Seleccionar propietario</option>
                        </select>
                </div>

                <div class="col-md-6 mb-4">
                    <label>Estado</label>
                    <select class="form-select">
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>

            </div>

            <div class="d-flex justify-content-end gap-2 mt-2">
                <a href="/vista/mascotas" class="btn btn-outline-secondary btn-custom-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary btn-custom-primary">Registrar Mascota</button>
            </div>

        </form>

    </div>
</div>

	</div><!-- /vc-content -->

</div><!-- /vc-layout -->

<script>
	document.addEventListener('DOMContentLoaded', function() {
		document.querySelectorAll('.vc-section-toggle').forEach(function(toggle) {
			toggle.addEventListener('click', function() {
				toggle.closest('.vc-section').classList.toggle('open');
			});
		});
	});
</script>

</body>
</html>
