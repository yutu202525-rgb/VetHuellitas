<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Citas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#eef2f7;
font-family:Arial,sans-serif;
}

.contenedor{
margin-top:30px;
}

.card{
border:none;
border-radius:20px;
padding:25px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.titulo{
font-weight:bold;
color:#0f172a;
}

.form-control{
border-radius:10px;
height:45px;
}

.table{
margin-top:20px;
}

.table thead th{
color:#6b7280;
font-size:14px;
}

.table tbody tr:hover{
background:#f5f5f5;
}

.estado{

padding:5px 10px;
border-radius:15px;
font-size:12px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container contenedor">

<div class="card">

<div class="d-flex justify-content-between align-items-center">

<div>

<h3 class="titulo">
📅 Módulo de Citas Médicas
</h3>

<p class="text-secondary">
Listado de citas registradas
</p>

</div>

<div>

	<a href="/nueva-cita" class="btn btn-light">
	+ Programar Cita
	</a>

<button class="btn btn-primary">
Listado de Citas
</button>

</div>

</div>


<input type="text"
class="form-control mt-4"
placeholder="Buscar...">


<table class="table table-hover">

<thead>

<tr>

	<tr>
		
	<th>CÓDIGO</th>
	<th>FECHA</th>
	<th>HORA</th>
	<th>MASCOTA</th>
	<th>PROPIETARIO</th>
	<th>VETERINARIO</th>
	<th>MOTIVO</th>
	<th>ESTADO</th>
	<th class="text-center">ACCIONES</th>

	</tr>
</tr>

</thead>

<tbody>

	<tr th:each="c : ${listaCitas}">

	<td th:text="'C-00'+${c.idCita}"></td>

	<td th:text="${#dates.format(c.fecha,'yyyy-MM-dd')}"></td>

	<td th:text="${c.hora}"></td>

	<td th:text="${c.mascota}"></td>

	<td th:text="${c.propietario}"></td>

	<td th:text="${c.veterinario}"></td>

	<td th:text="${c.motivo}"></td>

	<td>

		<span class="estado"
		th:classappend="${c.estado=='Pendiente'} ? ' bg-warning text-dark' :
		(${c.estado=='Atendida'} ? ' bg-success text-white' :
		' bg-primary text-white')"

		th:text="${c.estado}">
		</span>

		</td>

		<td class="text-center">

		<div class="d-flex justify-content-center gap-2">

			<a th:href="@{/editar-cita/{id}(id=${c.idCita})}"
			class="btn btn-warning btn-sm">

			Editar

			</a>

			<a th:href="@{/eliminar-cita/{id}(id=${c.idCita})}"
			class="btn btn-danger btn-sm"
			onclick="return confirm('¿Eliminar cita?')">

			Eliminar

			</a>

		</div>

		</td>

		</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
