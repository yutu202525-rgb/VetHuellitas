<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Nueva Cita</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>
body{
background:#eef2f7;
font-family:Arial,sans-serif;
}

.card{
margin-top:40px;
padding:30px;
border:none;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h3>📅 Programar Nueva Cita</h3>

<form th:action="@{/guardar-cita}"
method="post"
th:object="${cita}">

<input type="hidden"
th:field="*{idCita}">

<div class="row">

<div class="col-md-6 mb-3">
<label>Fecha</label>
<input type="date"
class="form-control"
th:field="*{fecha}">
</div>

<div class="col-md-6 mb-3">
<label>Hora</label>
<input type="text"
class="form-control"
placeholder="09:00"
th:field="*{hora}">
</div>

<div class="col-md-6 mb-3">
<label>Mascota</label>
<input type="text"
class="form-control"
th:field="*{mascota}">
</div>

<div class="col-md-6 mb-3">
<label>Propietario</label>
<input type="text"
class="form-control"
th:field="*{propietario}">
</div>

<div class="col-md-6 mb-3">

    <label>Veterinario</label>

    <select class="form-control"
            th:field="*{veterinario}">

        <option value="">
            Seleccione veterinario
        </option>

        <option
            th:each="v : ${listaVeterinarios}"
            th:value="${v.nombres}"
            th:text="${v.nombres}">
        </option>

    </select>

</div>

<div class="col-md-6 mb-3">
<label>Motivo</label>
<input type="text"
           class="form-control"
           name="motivo"
           th:field="*{motivo}">
</div>

<div class="col-md-12 mb-3">
<label>Estado</label>

<select class="form-select"
th:field="*{estado}">

<option value="Pendiente">Pendiente</option>
<option value="Programada">Programada</option>
<option value="Atendida">Atendida</option>
</select>

</div>

</div>

<button type="submit"
class="btn btn-success">
Guardar </button>

<a href="/vista/citas"
class="btn btn-secondary">
Volver </a>

</form>

</div>

</div>

</body>
</html>
